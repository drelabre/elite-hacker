// ─── MATRIX RAIN ───────────────────────────────────────
const matrixRain = (() => {
  const canvas = $('#matrix-canvas');
  const ctx = canvas.getContext('2d');
  let drops = [];
  let animId = null;
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*(){}[]|;:<>?/~`\u30A0\u30A1\u30A2\u30A3\u30A4\u30A5\u30A6\u30A7\u30A8\u30A9\u30AA\u30AB\u30AC\u30AD\u30AE\u30AF\u30B0\u30B1\u30B2\u30B3\u30B4\u30B5\u30B6\u30B7\u30B8\u30B9\u30BA\u30BB\u30BC\u30BD\u30BE\u30BF\u30C0';

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const cols = Math.floor(canvas.width / 14);
    drops = Array(cols).fill(0).map(() => rand(-50, 0));
  }

  function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = '14px monospace';
    for (let i = 0; i < drops.length; i++) {
      const ch = chars[rand(0, chars.length - 1)];
      ctx.fillText(ch, i * 14, drops[i] * 14);
      if (drops[i] * 14 > canvas.height && Math.random() > 0.98) {
        drops[i] = 0;
      }
      drops[i]++;
    }
    animId = requestAnimationFrame(draw);
  }

  function start(duration = 4000) {
    resize();
    canvas.classList.add('active');
    draw();
    setTimeout(() => {
      canvas.classList.remove('active');
      setTimeout(() => {
        cancelAnimationFrame(animId);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }, 600);
    }, duration);
  }

  window.addEventListener('resize', resize);
  resize();

  return { start };
})();

// ─── BOOT SEQUENCE ─────────────────────────────────────
async function bootSequence() {
  const bootEl = $('#boot-text');
  const lines = [
    'SHADOW_OS v4.7.2 [BUILD 0x' + hex(8).toUpperCase() + ']',
    '\u2550'.repeat(48),
    '',
    '[OK] Loading kernel modules...',
    '[OK] Initializing cryptographic engine...',
    '[OK] AES-256-GCM / ChaCha20 / RSA-4096 ready',
    '[OK] Establishing TOR relay circuit...',
    '[OK] Route: ' + ip() + ' \u2192 ' + ip() + ' \u2192 ' + ip(),
    '[OK] Spoofing MAC address: ' + mac(),
    '[OK] Anonymizing network fingerprint...',
    '[OK] JA3 hash randomized: ' + hex(16),
    '[OK] Loading exploit database (2,847 entries)...',
    '[OK] Quantum entropy pool initialized',
    '[OK] Anti-forensics module loaded',
    '',
    '\u2550'.repeat(48),
    'SYSTEM READY \u2014 ALL MODULES OPERATIONAL',
    '',
    '> Awaiting operator input...',
    '> Start typing to begin infiltration_',
  ];

  let text = '';
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    for (let j = 0; j < line.length; j++) {
      text += line[j];
      bootEl.textContent = text;
      await sleep(rand(1, 5));
    }
    text += '\n';
    bootEl.textContent = text;
    Audio.boot(i);
    await sleep(rand(30, 80));
  }

  await sleep(400);

  // Show "press any key" prompt — needed for fullscreen user gesture
  const prompt = document.createElement('div');
  prompt.textContent = '> PRESS ANY KEY TO BEGIN INFILTRATION';
  prompt.style.cssText = 'margin-top:20px;animation:blink 1s step-end infinite;color:var(--gc);text-shadow:0 0 8px var(--gc)';
  bootEl.parentElement.appendChild(prompt);

  // Wait for user gesture, then go fullscreen and dismiss boot
  await new Promise(resolve => {
    function go() {
      document.removeEventListener('keydown', go);
      document.removeEventListener('click', go);
      document.removeEventListener('touchstart', go);
      const el = document.documentElement;
      const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
      if (rfs) rfs.call(el).catch(() => {});
      resolve();
    }
    document.addEventListener('keydown', go, { once: false });
    document.addEventListener('click', go, { once: false });
    document.addEventListener('touchstart', go, { once: false });
  });

  $('#boot').classList.add('done');
  setTimeout(() => { $('#boot').style.display = 'none'; }, 800);
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ─── INIT ──────────────────────────────────────────────
async function init() {
  // Render initial HUD state
  fileTree.render();
  connections.render();
  updateStats();
  updateTraffic();
  updateClock();

  // Start intervals
  setInterval(updateStats, 2000);
  setInterval(updateClock, 1000);
  setInterval(updateTraffic, 1500);
  setInterval(ambientEvent, 3000);
  setInterval(() => connections.update(), 5000);
  setInterval(() => fileTree.cycle(), 7000);

  // Fullscreen toggle
  $('#fs-toggle').addEventListener('click', () => {
    if (document.fullscreenElement) {
      document.exitFullscreen();
    } else {
      document.documentElement.requestFullscreen().catch(() => {});
    }
  });
  document.addEventListener('fullscreenchange', () => {
    $('#fs-toggle').textContent = document.fullscreenElement ? '[><]' : '[  ]';
  });

  // Boot sequence
  await bootSequence();

  // Listen for keyboard input
  document.addEventListener('keydown', (e) => {
    // Allow F11 for fullscreen and F12 for devtools, Escape to exit
    if (e.key === 'F11' || e.key === 'F12' || e.key === 'Escape') return;
    onKey(e);
  });

  // Touch support for mobile
  document.addEventListener('touchstart', (e) => {
    e.preventDefault();
    onKey(null);
  });

  // Initial prompt in terminal
  appendToTerminal('root@shadow:~# ');
}
